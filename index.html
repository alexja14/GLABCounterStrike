<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLAB CS Leaderboard — Weekly Rankings</title>
    <meta name="description" content="Weekly Counter-Strike match leaderboard for the GLAB group" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Animated background particles -->
    <div id="particles-bg"></div>

    <header id="main-header">
      <div class="header-content">
        <div class="logo-area">
          <div class="logo-icon">⚔</div>
          <div class="logo-text">
            <h1>GLAB <span class="accent">CS</span></h1>
            <p class="tagline">Weekly Leaderboard</p>
          </div>
        </div>
        <nav class="header-nav">
          <button class="nav-btn active" data-section="leaderboard" id="nav-leaderboard">🏆 Leaderboard</button>
          <button class="nav-btn" data-section="matches" id="nav-matches">📋 Matches</button>
          <button class="nav-btn" data-section="stats" id="nav-stats">📊 Statistics</button>
        </nav>
      </div>
    </header>

    <main id="app">
      <!-- Leaderboard Section -->
      <section id="section-leaderboard" class="section active">
        <div class="section-header">
          <h2><span class="accent">#</span> Overall Standings</h2>
          <div class="stats-pills" id="global-stats"></div>
        </div>
        <div class="leaderboard-container">
          <div id="top-three" class="top-three-podium"></div>
          <div class="table-wrapper">
            <table id="leaderboard-table">
              <thead>
                <tr>
                  <th>Pos</th>
                  <th>Player</th>
                  <th>W</th>
                  <th>D</th>
                  <th>L</th>
                  <th>GP</th>
                  <th>Win%</th>
                  <th>RD</th>
                  <th>K</th>
                  <th>A</th>
                  <th>D</th>
                  <th>K/D</th>
                  <th>ADR</th>
                  <th>KAST</th>
                  <th>HLTV</th>
                </tr>
              </thead>
              <tbody id="leaderboard-body"></tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Matches Section -->
      <section id="section-matches" class="section">
        <div class="section-header">
          <h2><span class="accent">#</span> Match History</h2>
        </div>
        <div id="matches-list" class="matches-list"></div>
      </section>

      <!-- Stats Section -->
      <section id="section-stats" class="section">
        <div class="section-header">
          <h2><span class="accent">#</span> Statistics</h2>
        </div>
        <div id="stats-content" class="stats-grid"></div>
      </section>
    </main>

    <footer>
      <p>GLAB Counter-Strike League &copy; 2026 — Data updated weekly</p>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
